<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnSu — Lo que leo me forma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── CSS CUSTOM PROPERTIES ── */
  :root {
    --fondo:      #F5F5F5;
    --negro:      #121212;
    --tarjeta:    #FFFFFF;
    --terracota:  #C68A6D;
    --salvia:     #A7AEA1;
    --beige:      #E6E0D6;
    --texto-2:    #4A4540;
    --muted:      #9C9189;
    --borde:      rgba(18,18,18,0.12);
    --radius:     12px;
    --trans:      0.22s ease;
  }

  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--fondo);
    color: var(--negro);
    line-height: 1.6;
    min-height: 100vh;
  }

  img { display: block; max-width: 100%; }

  button { cursor: pointer; font-family: 'Inter', sans-serif; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--fondo); }
  ::-webkit-scrollbar-thumb { background: var(--salvia); border-radius: 3px; }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     NAV
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 900;
    background: rgba(245,245,245,0.72);
    backdrop-filter: blur(16px) saturate(1.4);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    border-bottom: 1px solid var(--borde);
    transition: background var(--trans), box-shadow var(--trans);
  }

  nav.scrolled {
    background: rgba(245,245,245,0.92);
    box-shadow: 0 2px 24px rgba(18,18,18,0.07);
  }

  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 28px;
    height: 66px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: var(--negro);
  }

  .nav-logo {
    width: 40px;
    height: 40px;
    object-fit: contain;
    border-radius: 8px;
  }

  .nav-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--negro);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     HERO
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .hero {
    max-width: 860px;
    margin: 0 auto;
    padding: 126px 28px 72px;
  }

  .hero-left {}

  .hero-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(42px, 5vw, 58px);
    font-weight: 300;
    line-height: 1.12;
    margin-bottom: 20px;
    color: var(--negro);
  }

  .hero-title em {
    font-style: italic;
    color: var(--terracota);
  }

  .hero-desc {
    font-size: 15px;
    color: var(--texto-2);
    line-height: 1.7;
    max-width: 460px;
    margin-bottom: 36px;
  }

  .hero-stats {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
  }

  .hero-stat {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 500;
    color: var(--negro);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  .stat-divider {
    width: 1px;
    height: 44px;
    background: var(--borde);
    align-self: center;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     SEPARADOR
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .separador {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 28px 48px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .sep-line {
    flex: 1;
    height: 1px;
    background: var(--borde);
  }

  .sep-text {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     FILTROS
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .filtros-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 28px 36px;
  }

  .filtros {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill-filtro {
    background: transparent;
    border: 1.5px solid var(--borde);
    color: var(--texto-2);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: all var(--trans);
    white-space: nowrap;
  }

  .pill-filtro:hover {
    border-color: var(--negro);
    color: var(--negro);
  }

  .pill-filtro.activo {
    background: var(--negro);
    border-color: var(--negro);
    color: #FFFFFF;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     GRID DE TARJETAS
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .grid-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 28px 96px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-state .empty-icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 14px;
    line-height: 1.6;
  }

  /* TARJETA */
  .card {
    background: var(--tarjeta);
    border-radius: var(--radius);
    border: 1px solid var(--borde);
    overflow: hidden;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    transition: transform var(--trans), box-shadow var(--trans), border-color var(--trans);
    position: relative;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(18,18,18,0.10);
    border-color: rgba(18,18,18,0.22);
  }

  .card-accent {
    height: 3px;
    width: 100%;
  }

  .card-accent.terracota { background: var(--terracota); }
  .card-accent.salvia    { background: var(--salvia); }

  .card-body {
    padding: 22px 22px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-eyebrow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 12px;
  }

  .card-autor {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 100px;
  }

  .badge-leyendo  { background: rgba(198,138,109,0.14); color: var(--terracota); }
  .badge-terminado{ background: rgba(167,174,161,0.18); color: #5c6358; }
  .badge-proximo  { background: rgba(230,224,214,0.7); color: var(--muted); }

  .card-titulo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 21px;
    font-weight: 500;
    line-height: 1.25;
    color: var(--negro);
    margin-bottom: 6px;
  }

  .card-libro {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 14px;
  }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .tag {
    font-size: 11px;
    font-weight: 500;
    color: var(--texto-2);
    border: 1px solid var(--borde);
    padding: 2px 9px;
    border-radius: 100px;
    letter-spacing: 0.02em;
  }

  .card-extracto {
    font-size: 13.5px;
    color: var(--texto-2);
    line-height: 1.65;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
    margin-bottom: 18px;
  }

  .card-progress-wrap {
    margin: 0 -0px;
    padding: 0 22px;
  }

  .card-progress-bar {
    height: 2px;
    border-radius: 2px;
    background: var(--beige);
    overflow: hidden;
    margin-bottom: 0;
  }

  .card-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .card-progress-fill.terracota { background: var(--terracota); }
  .card-progress-fill.salvia    { background: var(--salvia); }

  .card-footer {
    padding: 14px 22px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-fecha {
    font-size: 11.5px;
    color: var(--muted);
  }

  .card-arrow {
    font-size: 18px;
    color: var(--muted);
    transition: color var(--trans), transform var(--trans);
    line-height: 1;
  }

  .card:hover .card-arrow {
    color: var(--terracota);
    transform: translateX(3px);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     MODAL BASE
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(18,18,18,0.52);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s ease, visibility 0.25s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    visibility: visible;
  }

  .modal {
    background: var(--tarjeta);
    border-radius: 16px;
    width: 100%;
    max-width: 680px;
    max-height: 88vh;
    overflow-y: auto;
    position: relative;
    transform: translateY(16px) scale(0.98);
    transition: transform 0.28s cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 32px 80px rgba(18,18,18,0.2);
  }

  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     MODAL DETALLE
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .detail-bar {
    height: 4px;
    background: var(--terracota);
    border-radius: 16px 16px 0 0;
  }

  .detail-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--borde);
  }

  .detail-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .detail-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 400;
    line-height: 1.2;
    color: var(--negro);
    margin-bottom: 6px;
  }

  .detail-autor {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 16px;
  }

  .detail-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  /* Tabs */
  .detail-tabs {
    padding: 0 32px;
    border-bottom: 1px solid var(--borde);
    display: flex;
    gap: 0;
  }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 14px 0;
    margin-right: 28px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    transition: color var(--trans), border-color var(--trans);
    letter-spacing: 0.02em;
  }

  .tab-btn.activo {
    color: var(--negro);
    border-bottom-color: var(--terracota);
  }

  .tab-btn:hover { color: var(--negro); }

  .tab-panel {
    display: none;
    padding: 28px 32px;
  }

  .tab-panel.activo { display: block; }

  /* Panel Reflexión */
  .reflexion-texto {
    font-size: 14.5px;
    color: var(--texto-2);
    line-height: 1.75;
    margin-bottom: 24px;
  }

  .cita-bloque {
    border-left: 3px solid var(--terracota);
    padding: 14px 20px;
    background: rgba(198,138,109,0.06);
    border-radius: 0 8px 8px 0;
    margin-bottom: 24px;
  }

  .cita-texto {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 400;
    font-style: italic;
    color: var(--negro);
    line-height: 1.5;
  }

  .pregunta-bloque {
    background: var(--beige);
    border-radius: 10px;
    padding: 18px 20px;
  }

  .pregunta-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .pregunta-texto {
    font-size: 14px;
    color: var(--texto-2);
    line-height: 1.65;
  }

  /* Panel Mi vida */
  .vida-bloque {
    background: var(--beige);
    border-radius: 12px;
    padding: 22px 24px;
  }

  .vida-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .vida-texto {
    font-size: 14.5px;
    color: var(--texto-2);
    line-height: 1.75;
  }

  /* Panel Ficha */
  .ficha-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .ficha-item {
    background: var(--beige);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .ficha-key {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .ficha-val {
    font-size: 14.5px;
    color: var(--negro);
    font-weight: 500;
  }

  .ficha-progress-wrap { margin-top: 6px; }

  .ficha-bar {
    height: 4px;
    background: rgba(18,18,18,0.08);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 8px;
  }

  .ficha-bar-fill {
    height: 100%;
    background: var(--terracota);
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  /* Modal footer */
  .detail-footer {
    padding: 20px 32px 28px;
    border-top: 1px solid var(--borde);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-editar {
    background: transparent;
    border: 1.5px solid var(--borde);
    color: var(--texto-2);
    padding: 9px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    transition: all var(--trans);
  }

  .btn-editar:hover {
    border-color: var(--negro);
    color: var(--negro);
  }

  .btn-eliminar {
    background: transparent;
    border: 1.5px solid rgba(198,80,60,0.25);
    color: #b94030;
    padding: 9px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    transition: all var(--trans);
  }

  .btn-eliminar:hover {
    background: rgba(198,80,60,0.07);
    border-color: rgba(198,80,60,0.45);
  }

  .modal-close {
    position: absolute;
    top: 18px;
    right: 20px;
    background: none;
    border: none;
    font-size: 22px;
    color: var(--muted);
    line-height: 1;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background var(--trans), color var(--trans);
    z-index: 10;
  }

  .modal-close:hover {
    background: var(--beige);
    color: var(--negro);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     MODAL FORMULARIO
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .form-modal {
    max-width: 720px;
  }

  .form-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--borde);
  }

  .form-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--negro);
    margin-bottom: 4px;
  }

  .form-subtitle {
    font-size: 13px;
    color: var(--muted);
  }

  .form-body {
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 12px;
    border-bottom: 1px solid var(--borde);
    margin-bottom: 4px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 600;
    color: var(--texto-2);
    letter-spacing: 0.02em;
  }

  label .req {
    color: var(--terracota);
    margin-left: 2px;
  }

  input[type="text"],
  input[type="date"],
  input[type="number"],
  select,
  textarea {
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    color: var(--negro);
    background: var(--fondo);
    border: 1.5px solid var(--borde);
    border-radius: 8px;
    padding: 10px 14px;
    outline: none;
    transition: border-color var(--trans), box-shadow var(--trans);
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--terracota);
    box-shadow: 0 0 0 3px rgba(198,138,109,0.12);
  }

  input.error, select.error, textarea.error {
    border-color: #c04040;

  textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

  input[type="range"] {

  }

  input[type="range"]::-webkit-slider-thumb {

  .range-wrap {

  .btn-cancel {

  .btn-save {

  }

  .btn-save:hover {

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--negro);

    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    z-index: 2000;
    box-shadow: 0 8px 24px rgba(18,18,18,0.22);
    transform: translateY(16px);

    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     RESPONSIVE
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  @media (max-width: 1024px) {

    .modal-overlay { align-items: flex-end; padding: 0; }
    .detail-header { padding: 22px 20px 16px; }
    .detail-tabs { padding: 0 20px; }
    .tab-panel { padding: 22px 20px; }
    .detail-footer { padding: 16px 20px 22px; }
    .form-header { padding: 22px 20px 16px; }

    .form-row { grid-template-columns: 1fr; }
    .form-footer { padding: 14px 20px 22px; }

  }

  @media (max-width: 400px) {
    .hero-title { font-size: 36px; }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     MODO OSCURO
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  html.dark {
    --fondo:    #121212;
    --negro:    #F0EDE6;
    --tarjeta:  #1E1E1E;
    --beige:    #252220;
    --texto-2:  #C4BDB5;

    color-scheme: dark;
  }

  html.dark nav {
    background: rgba(18,18,18,0.82);
  }

  html.dark nav.scrolled {
    background: rgba(18,18,18,0.96);

  }

  html.dark .btn-save {
    background: var(--terracota);
    color: #121212;
  }

  html.dark .btn-save:hover { background: #b87a5d; }

  /* Tipo badges */
  .tipo-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;

  }
  .tipo-badge.libro     { background: rgba(198,138,109,0.14); color: var(--terracota); }

  html.dark .tipo-badge.reflexion { color: #8a9486; }

  html.dark .pill-filtro.activo {
    background: var(--terracota);
    border-color: var(--terracota);

  }

  html.dark .card:hover {
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    border-color: rgba(240,237,230,0.18);
  }

  html.dark .badge-terminado { color: #8a9486; }

  html.dark input[type="text"],
  html.dark input[type="date"],
  html.dark input[type="number"],
  html.dark select,
  html.dark textarea {
    background: #252220;
    color: #F0EDE6;
    border-color: rgba(240,237,230,0.12);
  }

  html.dark input[type="range"] { background: #3a3530; }

  html.dark .modal-close:hover { background: #2e2926; }

  html.dark #busqueda-input {
    background: #1E1E1E;
    color: #F0EDE6;

  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     BÚSQUEDA
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .busqueda-wrap {

  .busqueda-inner {

  .busqueda-clear {

    transition: opacity var(--trans), color var(--trans);

  .busqueda-clear.visible {

  /* Toggle modo oscuro */

    border-color: var(--muted);
  }

  @media (max-width: 640px) {
    .busqueda-wrap { padding: 0 16px 16px; }

</style>
</head>
<body>

<!-- ━━━━━━━━━━ BÚSQUEDA ━━━━━━━━━━ -->

      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">

<!-- ━━━━━━━━━━ MODAL DETALLE ━━━━━━━━━━ -->
<div class="modal-overlay" id="detail-overlay" onclick="overlayClick(event,'detail-overlay')">

<!-- Toast -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     JAVASCRIPT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DATOS — edita este array para añadir entradas
   tipo: "libro" | "reflexion"
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const libros = [
  {
    id: 1,
    tipo:       "libro",
    libro:      "Encontrando un hogar",
    autor:      "Renezz",
    fecha:      "2025-06-01",
    estado:     "leyendo",
    progreso:   90,
    tags:       ["Gratitud", "Control", "Fe", "Servicio"],
    tituloRef:  "Soltar el control no es rendirse — es confiar en algo más grande",
    idea:       "El libro explora cómo el desapego del resultado no es pasividad sino fe activa.",
    reflexion:  "Renezz habla desde sus propias experiencias de cómo el intento obsesivo de controlar el resultado de las cosas genera más sufrimiento que la incertidumbre en sí. El libro gira en torno a tres ejes: soltar el control y confiar en un plan mayor, vivir desde la gratitud en lugar del mérito, y encontrar sentido en los momentos difíciles a través de ayudar a otros.",
    cita:       "El plan de Dios es más grande que cualquier plan que yo podría haber diseñado para mí mismo.",
    vida:       "Conecta directo con mi patrón de sobre-inversión en relaciones. Cuando invierto demasiado en alguien que da señales mixtas, estoy intentando controlar el resultado. En HOMI también: lo que puedo controlar es el trabajo diario, el resto soltarlo.",
    tension:    "¿Cuándo soltar es madurez y cuándo es evasión? ¿Puede la gratitud convertirse en resignación?",
    dificultad: "Accesible",
    puntuacion: 9
  }
];

let filtroActivo = "Todos";
let busqueda     = "";

/* ── UTILIDADES ── */
const $ = id => document.getElementById(id);

function fmtFecha(str) {
  if (!str) return "";
  const [y, m, d] = str.split("-");
  const meses = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${+d} ${meses[+m-1]} ${y}`;
}

function badgeClass(estado) {
  return { leyendo:"badge-leyendo", terminado:"badge-terminado", proximo:"badge-proximo" }[estado] || "badge-proximo";
}

function badgeLabel(estado) {
  return { leyendo:"Leyendo", terminado:"Terminado", proximo:"Próximo" }[estado] || estado;
}

function tipoLabel(tipo) {
  return { libro:"Libro", reflexion:"Reflexión" }[tipo] || tipo;
}

function accentClass(l) { return l.tipo === "reflexion" ? "salvia" : "terracota"; }

function allAreas() {
  const areas = new Set();
  libros.forEach(l => l.tags.forEach(t => areas.add(t)));
  return areas.size;
}

/* ── ESTADÍSTICAS ── */
function actualizarStats() {
  $("stat-libros").textContent      = libros.filter(l => l.tipo === "libro").length;
  $("stat-reflexiones").textContent = libros.filter(l => l.tipo === "reflexion").length;
  $("stat-areas").textContent       = allAreas();
}

/* ── FILTROS por tipo ── */
function renderFiltros() {
  const tipos   = ["Todos", ...new Set(libros.map(l => l.tipo))];
  const labels  = { Todos:"Todos", libro:"Libros", reflexion:"Reflexiones" };
  $("filtros-container").innerHTML = tipos.map(t => `
    <button class="pill-filtro${t === filtroActivo ? " activo" : ""}"
      onclick="setFiltro('${t}')">
      ${labels[t] || t}
    </button>
  `).join("");
}

function setFiltro(tipo) {
  filtroActivo = tipo;
  renderFiltros();
  renderCards();
}

/* ── BÚSQUEDA ── */
function setBusqueda(val) {
  busqueda = val.trim().toLowerCase();
  $("busqueda-clear").classList.toggle("visible", busqueda.length > 0);
  renderCards();
}

function limpiarBusqueda() {
  $("busqueda-input").value = "";
  setBusqueda("");
}

/* ── TARJETAS ── */
function renderCards() {
  const grid = $("cards-grid");
  let lista = filtroActivo === "Todos"
    ? libros
    : libros.filter(l => l.tipo === filtroActivo);

  if (busqueda) {
    lista = lista.filter(l => {
      const haystack = [l.tituloRef, l.autor, l.libro, l.reflexion, ...l.tags]
        .join(" ").toLowerCase();
      return haystack.includes(busqueda);
    });
  }

  if (lista.length === 0) {
    const msg = busqueda
      ? `No hay resultados para "<strong>${busqueda}</strong>".`
      : "Todavía no hay entradas en esta categoría.";
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📖</div>
        <p>${msg}</p>
      </div>`;
    return;
  }

  grid.innerHTML = lista.map(l => {
    const ac   = accentClass(l);
    const tags = l.tags.map(t => `<span class="tag">${t}</span>`).join("");
    return `
    <article class="card" onclick="abrirDetalle(${l.id})">
      <div class="card-accent ${ac}"></div>
      <div class="card-body">
        <div class="card-eyebrow">
          <span class="card-autor">${l.autor}</span>
          <div style="display:flex;gap:6px;align-items:center;">
            <span class="tipo-badge ${l.tipo}">${tipoLabel(l.tipo)}</span>
            <span class="badge ${badgeClass(l.estado)}">${badgeLabel(l.estado)}</span>
          </div>
        </div>
        <h3 class="card-titulo">${l.tituloRef}</h3>
        <p class="card-libro">${l.libro}</p>
        <div class="card-tags">${tags}</div>
        <p class="card-extracto">${l.reflexion}</p>
      </div>
      <div class="card-progress-wrap">
        <div class="card-progress-bar">
          <div class="card-progress-fill ${ac}" style="width:${l.progreso}%"></div>
        </div>
      </div>
      <div class="card-footer">
        <span class="card-fecha">${fmtFecha(l.fecha)}</span>
        <span class="card-arrow">&#x2192;</span>
      </div>
    </article>`;
  }).join("");
}

/* ── MODAL DETALLE ── */
function abrirDetalle(id) {
  const l = libros.find(x => x.id === id);
  if (!l) return;

  $("d-autor").textContent       = l.autor;
  const badge = $("d-badge");
  badge.textContent              = badgeLabel(l.estado);
  badge.className                = `badge ${badgeClass(l.estado)}`;
  $("d-titulo").textContent      = l.tituloRef;
  $("d-libro-autor").textContent = l.libro;
  $("d-tags").innerHTML          = l.tags.map(t=>`<span class="tag">${t}</span>`).join("");
  $("d-reflexion").textContent   = l.reflexion;

  const citaWrap = $("d-cita-wrap");
  const pregWrap = $("d-pregunta-wrap");

  if (l.cita) {
    $("d-cita").textContent = `"${l.cita}"`;
    citaWrap.style.display = "";
  } else { citaWrap.style.display = "none"; }

  if (l.tension) {
    $("d-pregunta").textContent = l.tension;
    pregWrap.style.display = "";
  } else { pregWrap.style.display = "none"; }

  $("d-vida").textContent = l.vida || "—";

  $("d-ficha-grid").innerHTML = `
    <div class="ficha-item">
      <p class="ficha-key">Tipo</p>
      <p class="ficha-val">${tipoLabel(l.tipo)}</p>
    </div>
    <div class="ficha-item">
      <p class="ficha-key">${l.tipo === "libro" ? "Libro" : "Fuente"}</p>
      <p class="ficha-val">${l.libro}</p>
    </div>
    <div class="ficha-item">
      <p class="ficha-key">Autor</p>
      <p class="ficha-val">${l.autor || "—"}</p>
    </div>
    <div class="ficha-item">
      <p class="ficha-key">Fecha</p>
      <p class="ficha-val">${fmtFecha(l.fecha) || "—"}</p>
    </div>
    <div class="ficha-item">
      <p class="ficha-key">Estado</p>
      <p class="ficha-val">${badgeLabel(l.estado)}</p>
    </div>
    <div class="ficha-item">
      <p class="ficha-key">Progreso</p>
      <p class="ficha-val">${l.progreso}%</p>
      <div class="ficha-bar"><div class="ficha-bar-fill" style="width:${l.progreso}%"></div></div>
    </div>
    <div class="ficha-item">
      <p class="ficha-key">Dificultad</p>
      <p class="ficha-val">${l.dificultad || "—"}</p>
    </div>
    <div class="ficha-item">
      <p class="ficha-key">Puntuación</p>
      <p class="ficha-val">${l.puntuacion ? l.puntuacion + " / 10" : "—"}</p>
    </div>
  `;

  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("activo"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("activo"));
  document.querySelectorAll(".tab-btn")[0].classList.add("activo");
  $("tab-reflexion").classList.add("activo");

  abrirModal("detail-overlay");
}

function cambiarTab(btn, panelId) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("activo"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("activo"));
  btn.classList.add("activo");
  $(panelId).classList.add("activo");
}

/* ── MODALES ── */
function abrirModal(overlayId) {
  $(overlayId).classList.add("open");
  document.body.style.overflow = "hidden";
}

function cerrarModal(overlayId) {
  $(overlayId).classList.remove("open");
  document.body.style.overflow = "";
}

function overlayClick(e, overlayId) {
  if (e.target.id === overlayId) cerrarModal(overlayId);
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") cerrarModal("detail-overlay");
});

/* ── MODO OSCURO ── */
function toggleDarkMode() {
  const isDark = document.documentElement.classList.toggle("dark");
  $("dark-icon").textContent = isDark ? "☀" : "🌙";
  localStorage.setItem("ensu-dark", isDark ? "1" : "0");
}

function initDarkMode() {
  if (localStorage.getItem("ensu-dark") === "1") {
    document.documentElement.classList.add("dark");
    $("dark-icon").textContent = "☀";
  }
}

/* ── NAV SCROLL ── */
window.addEventListener("scroll", () => {
  const nav = $("main-nav");
  if (window.scrollY > 20) nav.classList.add("scrolled");
  else nav.classList.remove("scrolled");
}, { passive: true });

/* ── INIT ── */
initDarkMode();
actualizarStats();
renderFiltros();
renderCards();
</script>
</body>
</html>
